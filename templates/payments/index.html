<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуализация платежей | Лабмедиа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 40px; }
        .chart-container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4 text-center">Аналитика платежей (Тестовое задание)</h2>
    
    <div class="d-flex justify-content-center mb-4">
        <button id="toggleBtn" class="btn btn-primary btn-lg">
            Переключить на Гистограмму (По клиентам)
        </button>
    </div>

    <div class="chart-container">
        <canvas id="paymentChart" height="100"></canvas>
    </div>
</div>

<script>
    const rawData = JSON.parse('{{ chart_data_json|escapejs }}');
    
    let currentChart = null;
    let isLineChart = true;

    const lineLabels = rawData.map(item => item.date);
    const lineData = rawData.map(item => item.amount);

    const barLabels = rawData.map(item => item.client_name);
    const barData = rawData.map(item => item.amount);

    const ctx = document.getElementById('paymentChart').getContext('2d');

    function renderChart() {
        if (currentChart) {
            currentChart.destroy(); 
        }

        const config = {
            type: isLineChart ? 'line' : 'bar',
            data: {
                labels: isLineChart ? lineLabels : barLabels,
                datasets:[{
                    label: 'Величина платежа ($)',
                    data: isLineChart ? lineData : barData,
                    backgroundColor: isLineChart ? 'rgba(54, 162, 235, 0.2)' : 'rgba(75, 192, 192, 0.6)',
                    borderColor: isLineChart ? 'rgba(54, 162, 235, 1)' : 'rgba(75, 192, 192, 1)',
                    borderWidth: 2,
                    tension: 0.3, 
                    fill: isLineChart
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: isLineChart ? 'Зависимость величины платежа от даты' : 'Величина платежей по плательщикам',
                        font: { size: 18 }
                    }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        };

        currentChart = new Chart(ctx, config);
    }

    renderChart();

    document.getElementById('toggleBtn').addEventListener('click', function() {
        isLineChart = !isLineChart; 
        
        if (isLineChart) {
            this.textContent = "Переключить на Гистограмму (По клиентам)";
            this.classList.replace('btn-success', 'btn-primary');
        } else {
            this.textContent = "Переключить на График (По датам)";
            this.classList.replace('btn-primary', 'btn-success');
        }
        
        renderChart(); 
    });
</script>

</body>
</html>
